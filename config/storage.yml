test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3-compatible object storage (AWS S3, Cloudflare R2, MinIO, ...).
# Configured via env vars because production has no RAILS_MASTER_KEY, so
# encrypted credentials can't be decrypted there. Set S3_ENDPOINT only for
# non-AWS providers (e.g. R2).
amazon:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("S3_REGION", "eu-west-1") %>
  bucket: <%= ENV["S3_BUCKET"] %>
<% if ENV["S3_ENDPOINT"].present? %>
  endpoint: <%= ENV["S3_ENDPOINT"] %>
<% end %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
